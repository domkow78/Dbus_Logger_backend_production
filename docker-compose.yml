services:
  dbus-logger:
    build: .
    container_name: dbus-logger
    restart: unless-stopped
    # Dla poprawnego IP na OLED używamy sieci hosta (Raspberry Pi LAN IP)
    network_mode: host
    environment:
      - STATION_ID=${COMPUTERNAME:-${HOSTNAME:-raspberrypi}}
      - TZ=Europe/Warsaw
      - OLED_ENABLED=1
      - OLED_I2C_BUS=1
      - OLED_I2C_ADDR=0x3C
      - OLED_UPDATE_SEC=1.0
    volumes:
      - ./logs:/app/logs
      - ./app_logs:/app/app_logs
    devices:
      - /dev/serial0:/dev/serial0
      - /dev/i2c-1:/dev/i2c-1
